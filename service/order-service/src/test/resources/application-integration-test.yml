spring:
  lifecycle:
    timeout-per-shutdown-phase: 5s
  datasource:
    hikari:
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: update
  cloud:
    stream:
      kafka:
        binder:
          # 컨테이너 종료 후 끊긴 브로커 재연결 시도로 JVM 종료가 늘어지지 않도록 짧게
          consumer-properties:
            request.timeout.ms: 3000
            default.api.timeout.ms: 3000
            session.timeout.ms: 6000
          producer-properties:
            max.block.ms: 3000
            delivery.timeout.ms: 3000
            request.timeout.ms: 3000
            retries: 0
      bindings:
        onStockReservationFailed-in-0:
          group: "order-service-it-${random.uuid}"
        onPaymentInitialized-in-0:
          group: "order-service-it-${random.uuid}"
        onPaymentApproved-in-0:
          group: "order-service-it-${random.uuid}"
        onPaymentFailed-in-0:
          group: "order-service-it-${random.uuid}"
        onPaymentExpired-in-0:
          group: "order-service-it-${random.uuid}"

order:
  expiry:
    pending-expiry-minutes: 99999

service:
  client:
    product:
      base-url: http://localhost:1
      connect-timeout: 1000
      read-timeout: 1000

logging:
  level:
    org.testcontainers: INFO
    com.github.dockerjava: WARN
    org.apache.kafka: WARN
    dev.labs.commerce.order: DEBUG

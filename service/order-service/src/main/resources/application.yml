server:
  port: 20103

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:20011/commerce?currentSchema=order
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update

  cloud:
    function:
      definition: onStockReservationFailed;onPaymentApproved;onPaymentFailed
    stream:
      kafka:
        binder:
          brokers: localhost:20023
      bindings:
        order-created-out-0:
          destination: order.created
          content-type: application/json
        order-aborted-out-0:
          destination: order.aborted
          content-type: application/json
        order-paid-out-0:
          destination: order.paid
          content-type: application/json
        onStockReservationFailed-in-0:
          destination: stock.reservation-failed
          group: order-service
          content-type: application/json
        onPaymentApproved-in-0:
          destination: payment.approved
          group: order-service
          content-type: application/json
        onPaymentFailed-in-0:
          destination: payment.failed
          group: order-service
          content-type: application/json

service:
  client:
    product:
      base-url: http://localhost:20101
      connect-timeout: 3000
      read-timeout: 5000

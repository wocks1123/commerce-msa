server:
  port: 20103

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:20011/commerce?currentSchema=order
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update

  cloud:
    function:
      definition: onStockDeducted;onStockDeductionFailed
    stream:
      kafka:
        binder:
          brokers: localhost:20023
      bindings:
        order-created-out-0:
          destination: order
          content-type: application/json
        onStockDeducted-in-0:
          destination: stock.deducted
          group: order-service
          content-type: application/json
        onStockDeductionFailed-in-0:
          destination: stock.deduction-failed
          group: order-service
          content-type: application/json

service:
  client:
    product:
      base-url: http://localhost:20101
      connect-timeout: 3000
      read-timeout: 5000

server:
  port: 20103

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:20011/commerce?currentSchema=order
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update

  cloud:
    function:
      definition: onStockReservationFailed;onPaymentInitialized;onPaymentApproved;onPaymentFailed;onPaymentExpired
    stream:
      kafka:
        binder:
          brokers: localhost:20023
        bindings:
          onStockReservationFailed-in-0:
            consumer:
              enableDlq: true
              dlqName: stock.reservation.failed.DLT
          onPaymentInitialized-in-0:
            consumer:
              enableDlq: true
              dlqName: payment.initialized.DLT
          onPaymentApproved-in-0:
            consumer:
              enableDlq: true
              dlqName: payment.approved.DLT
          onPaymentFailed-in-0:
            consumer:
              enableDlq: true
              dlqName: payment.failed.DLT
          onPaymentExpired-in-0:
            consumer:
              enableDlq: true
              dlqName: payment.expired.DLT
      bindings:
        order-aborted-out-0:
          destination: order.aborted
          content-type: application/json
        order-expired-out-0:
          destination: order.expired
          content-type: application/json
        order-paid-out-0:
          destination: order.paid
          content-type: application/json
        onStockReservationFailed-in-0:
          destination: stock.reservation.failed
          group: order-service
          content-type: application/json
        onPaymentInitialized-in-0:
          destination: payment.initialized
          group: order-service
          content-type: application/json
        onPaymentApproved-in-0:
          destination: payment.approved
          group: order-service
          content-type: application/json
        onPaymentFailed-in-0:
          destination: payment.failed
          group: order-service
          content-type: application/json
        onPaymentExpired-in-0:
          destination: payment.expired
          group: order-service
          content-type: application/json

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  level:
    org.apache.kafka: WARN
    org.springframework.cloud.stream: WARN
    org.springframework.kafka: WARN

service:
  client:
    product:
      base-url: http://localhost:20101
      connect-timeout: 3000
      read-timeout: 5000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

order:
  expiry:
    pending-expiry-minutes: 10

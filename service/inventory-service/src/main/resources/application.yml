server:
  port: 20102

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:20011/commerce?currentSchema=inventory
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update

  cloud:
    function:
      definition: onProductEvents;onOrderAbortedEvents;onOrderExpiredEvents;onOrderPaidEvents
    stream:
      kafka:
        binder:
          brokers: localhost:20023
        bindings:
          onProductEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: product.registered.DLT
          onOrderAbortedEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: order.aborted.DLT
          onOrderExpiredEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: order.expired.DLT
          onOrderPaidEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: order.paid.DLT
      bindings:
        onProductEvents-in-0:
          destination: product.registered
          group: inventory-service
          content-type: application/json
        onOrderAbortedEvents-in-0:
          destination: order.aborted
          group: inventory-service
          content-type: application/json
        onOrderExpiredEvents-in-0:
          destination: order.expired
          group: inventory-service
          content-type: application/json
        onOrderPaidEvents-in-0:
          destination: order.paid
          group: inventory-service
          content-type: application/json

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  level:
    org.apache.kafka: WARN
    org.springframework.cloud.stream: WARN
    org.springframework.kafka: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
